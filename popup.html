<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IR Scholar: Dual-Model Researcher</title>
  <style>
    body { width: 650px; font-family: 'Georgia', serif; padding: 15px; background-color: #f4f4f4; margin: 0; }
    .header { text-align: center; margin-bottom: 15px; }
    #status { font-size: 12px; color: #666; margin-bottom: 10px; font-style: italic; }
    button { background: #003366; color: white; border: none; padding: 12px; cursor: pointer; width: 100%; border-radius: 4px; font-size: 14px; font-weight: bold; transition: background 0.3s; }
    .container { display: flex; gap: 15px; margin-top: 15px; }
    .column { width: 50%; border: 1px solid #ccc; padding: 12px; border-radius: 4px; background: white; box-sizing: border-box; }
    h2 { font-size: 15px; color: #333; border-bottom: 2px solid #003366; margin-top: 0; padding-bottom: 5px; }
    .result-text { font-size: 13px; line-height: 1.6; height: 250px; overflow-y: auto; white-space: pre-wrap; color: #444; background: #fafafa; padding: 5px; }
    .audit-box { width: 100%; border: 2px solid #003366; padding: 15px; border-radius: 4px; background: #fffdf9; margin-top: 15px; box-sizing: border-box; }
    .audit-text { font-size: 13px; line-height: 1.6; height: 150px; overflow-y: auto; white-space: pre-wrap; color: #222; }
    .footer-links { margin-top: 10px; text-align: right; font-size: 11px; }
    a { color: #003366; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div id="status">Ready for Analysis</div>
    <button id="analyzeBtn">RUN COMPARATIVE ANALYSIS</button>
  </div>
  
  <div class="container">
    <div class="column">
      <h2>Gemini 2.5 Flash (USA)</h2>
      <div id="geminiResult" class="result-text">Awaiting data...</div>
    </div>
    <div class="column">
      <h2>DeepSeek-V3 (Open)</h2>
      <div id="deepseekResult" class="result-text">Awaiting data...</div>
    </div>
  </div>

  <div class="audit-box">
    <h3 style="margin-top:0; color:#003366; font-size:15px;">Scholarly Synthesis & Bias Audit</h3>
    <div id="auditResult" class="audit-text">Analysis required to generate synthesis...</div>
  </div>

  <div class="footer-links">
    <a href="#" id="openSettings">API Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
